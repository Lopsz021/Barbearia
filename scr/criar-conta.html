<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bodyrec">

    <header>
        <nav><button class="voltar"><a href="login.html">voltar a página de login</a></button></nav>
    </header>

    <main class="container2">
        <form action="/criar" method="POST">
        
        <label for="usuemail">EMAIL :</label>

        <input type="email" id="usuemail" class="email2" name="email" autocomplete="off" readonly onfocus="this.removeAttribute('readonly'); this.value = this.value.toLowerCase()" 
        oninput = "setTimeout(() => this.value = this.value.toLowerCase(),0)"
        placeholder="exemplo@gmail.com"  
        required>

        <br>
        <label for="usuSenha">SENHA :</label>
        <input type="password" id="usuSenha" class="criacao-senha" name="senha" placeholder="Informe sua nova senha" required>

        <br>
        <button id="salvar-dados" type="submit">Criar conta</button>
        </form>
    </main>
    

</body>
</html>
