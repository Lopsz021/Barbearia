<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bodyrec">

    <header>
        <nav><button class="voltar"><a href="login.html">voltar a página de login</a></button></nav>
    </header>

    <main class="container2">
        <form id="formRecuperar">
        
        <label for="email">EMAIL :</label>

        <input type="email" id="usuemail" class="email2" name="email" autocomplete="off" readonly onfocus="this.removeAttribute('readonly'); this.value = this.value.toLowerCase()" 
        oninput = "setTimeout(() => this.value = this.value.toLowerCase(),0)"
        placeholder="exemplo@gmail.com"  
        required>

        <br>
        <button id="salvar-dados" type="submit">Recuperar</button>

        <p id="mensagem"></p>

        </form>
    </main>
    

    <script>
    const form = document.getElementById('formRecuperar');
    const mensagem = document.getElementById('mensagem');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        console.log('clicou')

        const email = document.getElementById('usuemail').value;

        const resposta = await fetch('/recuperar', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({email})
        });

        console.log('status', resposta.status);

        if(!resposta.ok){
            const texto = await resposta.text();
            mensagem.textContent = texto;
            return;
        }

        const texto = await resposta.text();

        const dados = JSON.parse(texto);
        window.location.href = `/novaSenha.html?token=${dados.token}`;
        
        
    });
</script>
</body>

</html>
